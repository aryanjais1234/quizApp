server:
  port: 8765

spring:
  application:
    name: api-gateway

  cloud:
    gateway:

      routes:
        - id: quiz-service
          uri: lb://QUIZ-SERVICE
          predicates:
            - Path=/quiz/**
          filters:
            - AuthFilter

        - id: question-service
          uri: lb://QUESTION-SERVICE
          predicates:
            - Path=/question/**
          filters:
            - AuthFilter

        - id: user-service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/auth/**

        - id: material-service
          uri: lb://MATERIAL-SERVICE
          predicates:
            - Path=/materials/**
          filters:
            - AuthFilter

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:5173"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true

eureka:
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
